services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sync
    ports:
      - "5432:5432"
    volumes:
      - sync-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sync"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sync?schema=public
      JWT_SECRET: change-me-before-production
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      FRONTEND_URL: http://localhost:5173,http://localhost:8080
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  sync-postgres:
